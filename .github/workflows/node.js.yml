# This workflow will do a clean install of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Deploy to Railway

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'        # or 'npm' if you use npm

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Trigger Railway Deployment
        uses: railwayapp/railway-action@v2
        with:
          token: ${{ secrets.RAILWAY_TOKEN }}
          environment: production

      - name: Wait for Deployment to Complete
        uses: haya14busa/action-wait-for@v1
        with:
          time: '90'           # Wait up to 90 seconds
          interval: '10'

      - name: Health Check
        run: |
          echo "Waiting for bot to be ready..."
          for i in {1..18}; do
            if curl -s -f https://bansheebot.up.railway.app/health > /dev/null; then
              echo "✅ Bot is live and healthy!"
              exit 0
            fi
            echo "Waiting... ($i/18)"
            sleep 10
          done
          echo "❌ Health check failed after 3 minutes"
          exit 1
